name: Publish npm and GitHub Release

on:
  push:
    tags:
      - 'v*'

permissions:
  actions: read
  contents: write
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Check and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Verify tag version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "require('./package.json').version")"
          if [[ "$tag_version" != "$package_version" ]]; then
            echo "Tag version $tag_version does not match package version $package_version."
            exit 1
          fi

      - name: Generate release notes
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: .github/scripts/release-notes.ps1 -OutputPath '${{ runner.temp }}/release-notes.md'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Publish package
        shell: bash
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          if npm view "$package_name@$package_version" version >/dev/null 2>&1; then
            echo "$package_name@$package_version is already published; skipping npm publish."
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create or update GitHub Release
        uses: actions/github-script@v7
        env:
          RELEASE_NOTES_PATH: ${{ runner.temp }}/release-notes.md
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync(process.env.RELEASE_NOTES_PATH, 'utf8');
            const tag = context.ref.replace('refs/tags/', '');
            let release;
            try {
              release = await github.rest.repos.getReleaseByTag({ ...context.repo, tag });
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            if (release) {
              await github.rest.repos.updateRelease({
                ...context.repo,
                release_id: release.data.id,
                name: tag,
                body,
              });
            } else {
              await github.rest.repos.createRelease({
                ...context.repo,
                tag_name: tag,
                name: tag,
                body,
              });
            }
